name: AI Model Security Gate

on:
  pull_request:
    paths:
      - 'models/**'
      - 'payloads/**'
      - '.github/workflows/model-scan.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: write
  security-events: write

jobs:
  scan-models:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build model artifacts (clean + malicious)
        run: |
          cd payloads
          python -m venv .venv
          . .venv/bin/activate
          pip install -q -r requirements.txt
          python build_clean_model.py
          python build_malicious_reduce.py
          python build_secret_exposed.py
          ls -la artifacts/

      - name: Authenticate to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Defender for Cloud CLI
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sL -o "$HOME/.local/bin/defender" https://aka.ms/defender-cli_linux-x64
          chmod +x "$HOME/.local/bin/defender"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/defender" --version || true

      - name: Scan all model artifacts
        id: scan
        run: |
          mkdir -p sarif
          fail=0
          shopt -s nullglob
          for model in payloads/artifacts/*.pkl payloads/artifacts/*.pt models/*.pkl models/*.onnx; do
            [[ -e "$model" ]] || continue
            name=$(basename "$model")
            echo "::group::Scanning $name"
            if ! defender scan model "$model" --modelscanner-Output "sarif/${name}.sarif"; then
              echo "::error file=$model::Malicious or risky artifact detected"
              fail=1
            fi
            echo "::endgroup::"
          done
          echo "fail=$fail" >> "$GITHUB_OUTPUT"
          exit $fail

      - name: Upload SARIF to GitHub code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sarif/

      - name: Block merge on detection
        if: failure()
        run: |
          echo "One or more models failed the Defender model scan."
          echo "Review SARIF output under the Security tab before merging."
          exit 1
